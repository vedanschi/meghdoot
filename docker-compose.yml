# ─────────────────────────────────────────────────
# Meghdoot-AI  –  Docker Compose
# ─────────────────────────────────────────────────
# Orchestrates the inference API service.
#
# Usage:
#   docker compose up --build
#   docker compose up -d          (detached)
# ─────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: meghdoot-ai:latest
    container_name: meghdoot-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./checkpoints:/app/checkpoints:ro
      - ./configs:/app/configs:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
